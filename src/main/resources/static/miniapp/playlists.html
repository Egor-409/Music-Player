<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Playlists</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin:0;
    background:#0f0f0f;
    font-family:Arial,sans-serif;
    color:#fff;
}

/* HEADER */
.header {
    display:flex;
    align-items:center;
    gap:12px;
    padding:16px 20px;
    background:#1a1a1a;
    border-bottom:1px solid #333;
}
.back-btn {
    background:none;
    border:none;
    color:white;
    font-size:22px;
    cursor:pointer;
}
.header-title {
    font-size:22px;
    font-weight:bold;
}

/* LAYOUT */
.layout {
    padding:15px;
}

/* PLAYLIST LIST */
.playlists-container {
    background:#121212;
    border-radius:12px;
    padding:10px;
}

/* PLAYLIST ITEM */
.playlist-item {
    display:grid;
    grid-template-columns:40px 1fr auto;
    gap:12px;
    padding:14px;
    border-radius:10px;
    cursor:pointer;
}
.playlist-item:hover {
    background:#1b1b1b;
}

.playlist-icon {
    font-size:26px;
}
.playlist-name {
    font-size:15px;
    font-weight:600;
}
.playlist-count {
    font-size:12px;
    color:#aaa;
}

.more-btn {
    background:none;
    border:none;
    color:#aaa;
    font-size:20px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <button class="back-btn" id="back">⬅</button>
    <div class="header-title">Плейлисты</div>
</div>

<div class="layout">
    <div class="playlists-container" id="list"></div>
</div>

<script>
const apiBase = "https://telegram-music-player-uh5o.onrender.com";
const tg = Telegram.WebApp;
tg.ready();
tg.expand();

/* BACK */
document.getElementById("back").onclick = () => {
    window.location.href = "/miniapp/index.html";
};

/* LOAD PLAYLISTS */
fetch(`${apiBase}/api/playlists`, {
    headers:{ "X-TG-INIT-DATA": tg.initData }
})
.then(r => r.json())
.then(data => {
    const list = document.getElementById("list");
    list.innerHTML = "";

    if(!data.length){
        list.innerHTML = `<div style="padding:20px;color:#aaa">Плейлистов пока нет</div>`;
        return;
    }

    data.forEach(p => {
        const div = document.createElement("div");
        div.className = "playlist-item";
        div.innerHTML = `
            <div class="playlist-icon">📁</div>
            <div>
                <div class="playlist-name">${p.name}</div>
                <div class="playlist-count">${p.tracksCount ?? 0} треков</div>
            </div>
            <button class="more-btn">⋯</button>
        `;

        div.onclick = () => {
            // далее будем открывать плейлист
            console.log("open playlist", p.id);
        };

        list.appendChild(div);
    });
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Telegram Music Cloud</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin:0;
    background:#0f0f0f;
    font-family:Arial,sans-serif;
    color:#fff;
}

/* HEADER */
.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 20px;
    background:#1a1a1a;
    border-bottom:1px solid #333;
}
.header-title { font-size:22px; font-weight:bold; }
.search-box input {
    padding:8px 12px;
    border-radius:6px;
    border:none;
    background:#222;
    color:#fff;
}

/* LAYOUT */
.layout { padding:15px; }

/* MENU */
.library-menu {
    display:flex;
    gap:10px;
    margin-bottom:15px;
}
.menu-btn {
    background:#1e1e1e;
    border:1px solid #333;
    color:#aaa;
    padding:8px 16px;
    border-radius:20px;
}
.menu-btn.active {
    background:#fff;
    color:#000;
}

/* TRACK LIST */
.songs-container {
    background:#121212;
    border-radius:12px;
    padding:10px;
}

.track-item {
    display:grid;
    grid-template-columns:30px 1fr auto auto;
    gap:12px;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
}
.track-item:hover { background:#1b1b1b; }

.track-title { font-size:14px; font-weight:600; }
.track-artist { font-size:12px; color:#aaa; }

.play-btn {
    width:36px;
    height:36px;
    border-radius:50%;
    border:1px solid #555;
    background:none;
    color:white;
}

.more-btn {
    background:none;
    border:none;
    color:#aaa;
    font-size:20px;
}

/* CONTEXT MENU */
.menu {
    position:absolute;
    background:#222;
    border:1px solid #333;
    border-radius:8px;
    padding:6px 0;
    z-index:1000;
}
.menu button {
    display:block;
    width:100%;
    background:none;
    border:none;
    color:#fff;
    padding:10px 16px;
    text-align:left;
}
.menu button:hover { background:#333; }

/* MINI PLAYER */
.mini-player {
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#1b1b1b;
    border-top:1px solid #333;
    padding:10px 15px;
}
.mini-player.hidden { display:none; }

.mini-title {
    font-size:14px;
    font-weight:600;
    margin-bottom:8px;
}

/* CONTROLS */
.controls {
    display:flex;
    justify-content:center;
    align-items:center;
    gap:26px;
    font-size:30px;
    margin-bottom:8px;
}
.ctrl-btn {
    background:none;
    border:none;
    color:white;
}

/* PROGRESS */
.progress {
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12px;
    color:#aaa;
}
.progress input[type=range] {
    flex:1;
    max-width:65%;
    accent-color:white;
}

#audio-player { display:none; }
</style>
</head>

<body>

<div class="header">
    <div class="header-title">Telegram Music Cloud</div>
    <div class="search-box">
        <input type="text" placeholder="Поиск...">
    </div>
</div>

<div class="layout">
    <div class="songs-container">
        <div class="library-menu">
            <button class="menu-btn active">🎵 Библиотека</button>
            <button class="menu-btn">📂 Плейлисты</button>
        </div>
        <div id="track-list"></div>
    </div>
</div>

<div class="mini-player hidden" id="mini-player">
    <div class="mini-title" id="mini-title"></div>

    <div class="controls">
        <button class="ctrl-btn" id="repeat">🔁</button>
        <button class="ctrl-btn" id="prev">⏮</button>
        <button class="ctrl-btn" id="play">▶</button>
        <button class="ctrl-btn" id="next">⏭</button>
        <button class="ctrl-btn" id="mini-more">⋯</button>
    </div>

    <div class="progress">
        <span id="current">0:00</span>
        <input type="range" id="progress" value="0" min="0" step="0.1">
        <span id="duration">0:00</span>
    </div>
</div>

<audio id="audio-player" preload="metadata"></audio>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();

const apiBase = "https://telegram-music-player-uh5o.onrender.com";
const audio = document.getElementById("audio-player");

const trackListDiv = document.getElementById("track-list");
const miniTitle = document.getElementById("mini-title");
const playBtn = document.getElementById("play");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");
const repeatBtn = document.getElementById("repeat");
const miniMore = document.getElementById("mini-more");

const progress = document.getElementById("progress");
const currentEl = document.getElementById("current");
const durationEl = document.getElementById("duration");
const miniPlayer = document.getElementById("mini-player");

let tracks = [];
let currentIndex = -1;
let repeat = false;
let menuEl = null;

const linkCache = new Map();

async function getStreamUrl(id){
    if(linkCache.has(id)) return linkCache.get(id);
    const r = await fetch(`${apiBase}/api/tracks/play/${id}`, {
        headers:{ "X-TG-INIT-DATA": tg.initData }
    });
    const data = await r.json();
    linkCache.set(id, data.streamUrl);
    return data.streamUrl;
}

async function loadTracks(){
    const r = await fetch(`${apiBase}/api/tracks`, {
        headers:{ "X-TG-INIT-DATA": tg.initData }
    });
    tracks = await r.json();
    renderTracks();
}

function renderTracks(){
    trackListDiv.innerHTML = "";
    tracks.forEach((t,i)=>{
        const div = document.createElement("div");
        div.className = "track-item";
        div.innerHTML = `
            <span>${i+1}</span>
            <div>
                <div class="track-title">${t.originalName}</div>
                <div class="track-artist">${t.performer || "Unknown"}</div>
            </div>
            <button class="play-btn">${i===currentIndex && !audio.paused ? "⏸" : "▶"}</button>
            <button class="more-btn">⋯</button>
        `;

        div.onclick = ()=> playTrack(i);
        div.querySelector(".more-btn").onclick = e => {
            e.stopPropagation();
            openMenu(e.clientX, e.clientY, t.id);
        };

        trackListDiv.appendChild(div);
    });
}

async function playTrack(index){
    currentIndex = index;
    audio.src = await getStreamUrl(tracks[index].id);
    await audio.play();
    miniTitle.innerText = tracks[index].originalName;
    playBtn.innerText = "⏸";
    miniPlayer.classList.remove("hidden");
    renderTracks();
}

playBtn.onclick = ()=>{
    if(audio.paused){ audio.play(); playBtn.innerText="⏸"; }
    else { audio.pause(); playBtn.innerText="▶"; }
    renderTracks();
};

nextBtn.onclick = ()=> currentIndex < tracks.length-1 && playTrack(currentIndex+1);
prevBtn.onclick = ()=> currentIndex > 0 && playTrack(currentIndex-1);

repeatBtn.onclick = ()=>{
    repeat = !repeat;
    audio.loop = repeat;
    repeatBtn.style.opacity = repeat ? "1" : "0.4";
};

audio.onended = ()=> !repeat && nextBtn.click();

audio.onloadedmetadata = ()=>{
    progress.max = audio.duration;
    durationEl.innerText = format(audio.duration);
};

audio.ontimeupdate = ()=>{
    progress.value = audio.currentTime;
    currentEl.innerText = format(audio.currentTime);
};

progress.oninput = ()=> audio.currentTime = progress.value;

function openMenu(x,y,trackId){
    closeMenu();
    menuEl = document.createElement("div");
    menuEl.className = "menu";
    menuEl.style.left = x+"px";
    menuEl.style.top = y+"px";
    menuEl.innerHTML = `
        <button onclick="deleteTrack(${trackId})">🗑 Удалить</button>
        <button>➕ Добавить в плейлист</button>
    `;
    document.body.appendChild(menuEl);
}

function closeMenu(){
    if(menuEl){ menuEl.remove(); menuEl=null; }
}

document.body.onclick = closeMenu;

async function deleteTrack(id){
    await fetch(`${apiBase}/api/tracks/${id}`, { method:"DELETE" });
    if(tracks[currentIndex]?.id === id){
        audio.pause();
        miniPlayer.classList.add("hidden");
        currentIndex = -1;
    }
    loadTracks();
}

miniMore.onclick = e=>{
    if(currentIndex<0) return;
    openMenu(e.clientX, e.clientY, tracks[currentIndex].id);
};

function format(t){
    const m = Math.floor(t/60);
    const s = Math.floor(t%60).toString().padStart(2,"0");
    return `${m}:${s}`;
}

loadTracks();
</script>

</body>
</html>

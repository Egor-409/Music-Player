<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Telegram Music Cloud</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin:0;
    background:#0f0f0f;
    font-family:Arial,sans-serif;
    color:#fff;
}

/* HEADER */
.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 20px;
    background:#1a1a1a;
    border-bottom:1px solid #333;
}
.header-title { font-size:22px; font-weight:bold; }

/* NAV */
.library-menu {
    display:flex;
    gap:10px;
}
.menu-btn {
    background:#1e1e1e;
    border:1px solid #333;
    color:#aaa;
    padding:8px 16px;
    border-radius:20px;
    cursor:pointer;
}
.menu-btn.active {
    background:#fff;
    color:#000;
}

/* PAGES */
.page { display:none; padding:15px; }
.page.active { display:block; }

/* SONGS */
.songs-container {
    background:#121212;
    border-radius:12px;
    padding:10px;
}
.track-item {
    display:grid;
    grid-template-columns:30px 1fr auto auto;
    gap:12px;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
}
.track-item:hover { background:#1b1b1b; }

/* PLAYLIST GRID */
.playlists-grid {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:14px;
}
.playlist-card {
    background:#1b1b1b;
    border-radius:14px;
    padding:16px;
    aspect-ratio:1/1;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    cursor:pointer;
}
.playlist-card:hover { background:#222; }
.playlist-title {
    font-size:16px;
    font-weight:600;
}
.playlist-count {
    font-size:12px;
    color:#aaa;
}

/* MINI PLAYER */
.mini-player {
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#1b1b1b;
    border-top:1px solid #333;
    padding:10px 15px;
}
.mini-player.hidden { display:none; }

.controls {
    display:flex;
    justify-content:center;
    gap:26px;
    font-size:28px;
}
.ctrl-btn {
    background:none;
    border:none;
    color:white;
    cursor:pointer;
}

#audio-player { display:none; }
</style>
</head>

<body>

<div class="header">
    <div class="header-title">Telegram Music Cloud</div>
    <div class="library-menu">
        <button class="menu-btn active" id="nav-library">🎵 Библиотека</button>
        <button class="menu-btn" id="nav-playlists">📂 Плейлисты</button>
    </div>
</div>

<!-- LIBRARY -->
<div class="page active" id="library-page">
    <div class="songs-container" id="track-list"></div>
</div>

<!-- PLAYLISTS -->
<div class="page" id="playlists-page">
    <div class="playlists-grid" id="playlist-list"></div>
</div>

<!-- MINI PLAYER -->
<div class="mini-player hidden" id="mini-player">
    <div id="mini-title"></div>
    <div class="controls">
        <button class="ctrl-btn" id="prev">⏮</button>
        <button class="ctrl-btn" id="play">▶</button>
        <button class="ctrl-btn" id="next">⏭</button>
    </div>
</div>

<audio id="audio-player"></audio>

<script>
const tg = Telegram.WebApp;
tg.ready(); tg.expand();

const apiBase = "https://telegram-music-player-uh5o.onrender.com";
const audio = document.getElementById("audio-player");

/* NAV */
const libraryPage = document.getElementById("library-page");
const playlistsPage = document.getElementById("playlists-page");
const navLibrary = document.getElementById("nav-library");
const navPlaylists = document.getElementById("nav-playlists");

function showLibrary(){
    libraryPage.classList.add("active");
    playlistsPage.classList.remove("active");
    navLibrary.classList.add("active");
    navPlaylists.classList.remove("active");
}

function showPlaylists(){
    playlistsPage.classList.add("active");
    libraryPage.classList.remove("active");
    navPlaylists.classList.add("active");
    navLibrary.classList.remove("active");
}

navLibrary.onclick = showLibrary;
navPlaylists.onclick = showPlaylists;

/* TRACKS */
const trackList = document.getElementById("track-list");
const miniPlayer = document.getElementById("mini-player");
const miniTitle = document.getElementById("mini-title");
const playBtn = document.getElementById("play");

let tracks=[], currentIndex=-1;

async function loadTracks(){
    const r = await fetch(`${apiBase}/api/tracks`, {
        headers:{ "X-TG-INIT-DATA": tg.initData }
    });
    tracks = await r.json();
    renderTracks();
}

function renderTracks(){
    trackList.innerHTML="";
    tracks.forEach((t,i)=>{
        const div=document.createElement("div");
        div.className="track-item";
        div.innerHTML=`
            <span>${i+1}</span>
            <div>${t.originalName}</div>
            <button>▶</button>
        `;
        div.onclick=()=>playTrack(i);
        trackList.appendChild(div);
    });
}

async function playTrack(i){
    currentIndex=i;
    const r=await fetch(`${apiBase}/api/tracks/play/${tracks[i].id}`,{
        headers:{ "X-TG-INIT-DATA": tg.initData }
    });
    const d=await r.json();
    audio.src=d.streamUrl;
    audio.play();
    miniTitle.innerText=tracks[i].originalName;
    miniPlayer.classList.remove("hidden");
    playBtn.innerText="⏸";
}

playBtn.onclick=()=>{
    if(audio.paused){ audio.play(); playBtn.innerText="⏸"; }
    else{ audio.pause(); playBtn.innerText="▶"; }
};

/* PLAYLISTS */
const playlistList=document.getElementById("playlist-list");

async function loadPlaylists(){
    const r=await fetch(`${apiBase}/api/playlists`,{
        headers:{ "X-TG-INIT-DATA": tg.initData }
    });
    const data=await r.json();
    playlistList.innerHTML="";
    data.forEach(p=>{
        const div=document.createElement("div");
        div.className="playlist-card";
        div.innerHTML=`
            <div class="playlist-title">${p.name}</div>
            <div class="playlist-count">${p.tracksCount ?? 0} треков</div>
        `;
        playlistList.appendChild(div);
    });
}

loadTracks();
loadPlaylists();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Telegram Music Cloud</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f0f;
            font-family: Arial, sans-serif;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }

        /* ---------- HEADER ---------- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background-color: #1a1a1a;
            border-bottom: 1px solid #333;
        }

        .header-title {
            font-size: 20px;
            font-weight: bold;
        }

        .search-box input {
            padding: 8px 12px;
            width: 200px;
            border: none;
            background-color: #222;
            color: white;
            border-radius: 6px;
        }

        /* ---------- LAYOUT ---------- */
        .layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            padding: 20px;
            height: calc(100vh - 70px);
        }

        /* ---------- SONG LIST ---------- */
        .songs-container {
            background-color: #121212;
            border-radius: 10px;
            padding: 15px;
            overflow-y: auto;
        }

        /* ---------- TOP MENU ---------- */
        .library-menu {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .menu-btn {
            background: #1e1e1e;
            border: 1px solid #333;
            color: #aaa;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }

        .menu-btn.active {
            background: #ffffff;
            color: #000;
            border-color: #fff;
        }

        /* ---------- TRACK ITEM ---------- */
        .track-item {
            display: grid;
            grid-template-columns: 30px 1fr auto;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .track-item:hover {
            background: #1b1b1b;
        }

        .track-title {
            font-size: 14px;
            font-weight: 600;
        }

        .track-artist {
            font-size: 12px;
            color: #aaa;
        }

        .track-actions {
            display: flex;
            gap: 8px;
        }

        .play-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: none;
            border: 1px solid #555;
            color: white;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        .more-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: none;
            border: none;
            color: #aaa;
            font-size: 18px;
            cursor: pointer;
        }

        .more-btn:hover {
            background: #2a2a2a;
            color: #fff;
        }

        /* ---------- PLAYER ---------- */
        .now-playing {
            background-color: #1c1c1c;
            padding: 20px;
            border-radius: 10px;
        }

        /* ---------- MINI PLAYER ---------- */
        .mini-player {
            display: none;
        }

        @media (max-width: 768px) {

            body {
                overflow-y: auto;
            }

            .now-playing {
                display: none;
            }

            .layout {
                grid-template-columns: 1fr;
                padding: 10px;
                gap: 10px;
                height: auto;
            }

            .songs-container {
                max-height: calc(100vh - 170px);
                overflow-y: scroll;
            }

            .mini-player {
                display: flex;
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                height: 70px;
                background: #1b1b1b;
                border-top: 1px solid #333;
                align-items: center;
                padding: 10px 15px;
                z-index: 999;
            }

            .mini-title {
                flex: 1;
                font-size: 15px;
                font-weight: 600;
                padding-left: 10px;
            }

            #audio-player {
                display: none;
            }

            .mini-btn {
                font-size: 28px;
                background: none;
                border: none;
                color: white;
                cursor: pointer;
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>

<body>

<div class="header">
    <div class="header-title">Telegram Music Cloud</div>
    <div class="search-box">
        <input type="text" placeholder="Поиск...">
    </div>
</div>

<div class="layout">

    <div class="songs-container">

        <div class="library-menu">
            <button class="menu-btn active">🎵 Библиотека</button>
            <button class="menu-btn">📂 Плейлисты</button>
        </div>

        <div id="track-list"></div>
    </div>

    <div class="now-playing">
        <h3>Сейчас играет:</h3>
        <p id="playing-title">Ничего</p>
        <audio id="audio-player" controls style="width:100%; margin-top:20px;"></audio>
    </div>

</div>

<div class="mini-player">
    <div class="mini-title" id="mini-title">Ничего</div>
    <button class="mini-btn" id="mini-btn">⏯</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    if (!tg.initData) {
        document.body.innerHTML =
            "<h3 style='color:white;padding:20px'>Откройте мини-апп через Telegram</h3>";
        throw new Error("Mini App not opened inside Telegram");
    }

    const initData = tg.initData;
    const apiBase = "https://telegram-music-player-uh5o.onrender.com";

    const trackListDiv = document.getElementById("track-list");
    const audio = document.getElementById("audio-player");
    const nowPlaying = document.getElementById("playing-title");
    const miniTitle = document.getElementById("mini-title");
    const miniBtn = document.getElementById("mini-btn");

    audio.preload = "none";

    async function loadTracks() {
        const response = await fetch(`${apiBase}/api/tracks`, {
            headers: { "X-TG-INIT-DATA": initData }
        });

        if (!response.ok) return;

        const tracks = await response.json();
        trackListDiv.innerHTML = "";

        tracks.forEach((t, index) => {
            const item = document.createElement("div");
            item.className = "track-item";

            item.innerHTML = `
                <span>${index + 1}</span>
                <div>
                    <div class="track-title">${t.originalName}</div>
                    <div class="track-artist">${t.performer || "Unknown"}</div>
                </div>
                <div class="track-actions">
                    <button class="play-btn">▶</button>
                    <button class="more-btn">⋮</button>
                </div>
            `;

            item.querySelector(".play-btn").onclick = () => {
                playTrack(t.id, t.originalName);
            };

            trackListDiv.appendChild(item);
        });
    }

    function playTrack(id, name) {
        audio.pause();
        audio.src = `${apiBase}/tracks/stream/${id}`;
        audio.load();
        audio.play();

        nowPlaying.innerText = name;
        miniTitle.innerText = name;
        miniBtn.innerText = "⏸";
    }

    miniBtn.onclick = () => {
        if (audio.paused) {
            audio.play();
            miniBtn.innerText = "⏸";
        } else {
            audio.pause();
            miniBtn.innerText = "▶";
        }
    };

    loadTracks();
</script>

</body>
</html>

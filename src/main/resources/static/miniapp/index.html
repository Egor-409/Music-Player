<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Telegram Music Cloud</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin:0;
    background:#0f0f0f;
    font-family:Arial,sans-serif;
    color:#fff;
}

/* HEADER */
.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 20px;
    background:#1a1a1a;
    border-bottom:1px solid #333;
}
.header-title { font-size:22px; font-weight:bold; }
.search-box input {
    padding:8px 12px;
    border-radius:6px;
    border:none;
    background:#222;
    color:#fff;
}

/* LAYOUT */
.layout { padding:15px; }

/* MENU */
.library-menu {
    display:flex;
    gap:10px;
    margin-bottom:15px;
}
.menu-btn {
    background:#1e1e1e;
    border:1px solid #333;
    color:#aaa;
    padding:8px 16px;
    border-radius:20px;
    cursor:pointer;
}
.menu-btn.active {
    background:#fff;
    color:#000;
}

/* CONTAINERS */
.view { display:none; }
.view.active { display:block; }

/* TRACK LIST */
.songs-container {
    background:#121212;
    border-radius:12px;
    padding:10px;
}

.track-item {
    display:grid;
    grid-template-columns:30px 1fr auto auto;
    gap:12px;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
}
.track-item:hover { background:#1b1b1b; }

.track-title { font-size:14px; font-weight:600; }
.track-artist { font-size:12px; color:#aaa; }

.play-btn {
    width:36px;
    height:36px;
    border-radius:50%;
    border:1px solid #555;
    background:none;
    color:white;
    cursor:pointer;
}

.more-btn {
    background:none;
    border:none;
    color:#aaa;
    font-size:20px;
    cursor:pointer;
}

/* PLAYLISTS GRID */
.playlists-grid {
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:14px;
}
.playlist-card {
    background:#1a1a1a;
    border-radius:14px;
    padding:20px;
    aspect-ratio:1/1;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:600;
    cursor:pointer;
}
.playlist-card:hover {
    background:#222;
}

/* CONTEXT MENU */
.context-menu {
    position:fixed;
    z-index:9999;
    min-width:200px;
    background:#1f1f1f;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,.6);
    padding:6px;
}
.context-menu.hidden { display:none; }

/* MINI PLAYER */
.mini-player {
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#1b1b1b;
    border-top:1px solid #333;
    padding:10px 15px;
}
.mini-player.hidden { display:none; }

/* CONTROLS */
.controls {
    display:flex;
    justify-content:center;
    gap:26px;
    font-size:30px;
}

.progress {
    display:flex;
    gap:8px;
    font-size:12px;
}

#audio-player { display:none; }
</style>
</head>

<body>

<div class="header">
    <div class="header-title">Telegram Music Cloud</div>
    <div class="search-box">
        <input type="text" placeholder="Поиск...">
    </div>
</div>

<div class="layout">
    <div class="library-menu">
        <button class="menu-btn active" id="btn-library">🎵 Библиотека</button>
        <button class="menu-btn" id="btn-playlists">📂 Плейлисты</button>
    </div>

    <!-- LIBRARY -->
    <div id="library-view" class="view active">
        <div class="songs-container">
            <div id="track-list"></div>
        </div>
    </div>

    <!-- PLAYLISTS -->
    <div id="playlists-view" class="view">
        <div class="playlists-grid">
            <div class="playlist-card">➕ Новый плейлист</div>
            <div class="playlist-card">❤️ Избранное</div>
        </div>
    </div>
</div>

<div class="mini-player hidden" id="mini-player">
    <div id="mini-title"></div>
    <div class="controls">
        <button id="prev">⏮</button>
        <button id="play">▶</button>
        <button id="next">⏭</button>
    </div>
</div>

<audio id="audio-player"></audio>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const apiBase = "https://telegram-music-player-uh5o.onrender.com";
const audio = document.getElementById("audio-player");

const trackListDiv = document.getElementById("track-list");
const miniPlayer = document.getElementById("mini-player");
const miniTitle = document.getElementById("mini-title");
const playBtn = document.getElementById("play");

const libraryView = document.getElementById("library-view");
const playlistsView = document.getElementById("playlists-view");

document.getElementById("btn-library").onclick = () => switchView("library");
document.getElementById("btn-playlists").onclick = () => switchView("playlists");

function switchView(view){
    libraryView.classList.toggle("active", view==="library");
    playlistsView.classList.toggle("active", view==="playlists");
    document.getElementById("btn-library").classList.toggle("active", view==="library");
    document.getElementById("btn-playlists").classList.toggle("active", view==="playlists");
}

/* TRACKS */
let tracks=[], currentIndex=-1;

async function loadTracks(){
    const r = await fetch(`${apiBase}/api/tracks`, {
        headers:{ "X-TG-INIT-DATA": tg.initData }
    });
    tracks = await r.json();
    renderTracks();
}

function renderTracks(){
    trackListDiv.innerHTML="";
    tracks.forEach((t,i)=>{
        const d=document.createElement("div");
        d.className="track-item";
        d.innerHTML=`<span>${i+1}</span><div>${t.originalName}</div><button>▶</button>`;
        d.onclick=()=>playTrack(i);
        trackListDiv.appendChild(d);
    });
}

async function playTrack(i){
    currentIndex=i;
    const r=await fetch(`${apiBase}/api/tracks/play/${tracks[i].id}`,{
        headers:{ "X-TG-INIT-DATA": tg.initData }
    });
    const d=await r.json();
    audio.src=d.streamUrl;
    audio.play();
    miniTitle.innerText=tracks[i].originalName;
    miniPlayer.classList.remove("hidden");
    playBtn.innerText="⏸";
}

playBtn.onclick=()=>{
    audio.paused ? audio.play() : audio.pause();
    playBtn.innerText = audio.paused ? "▶" : "⏸";
};

loadTracks();
</script>

</body>
</html>

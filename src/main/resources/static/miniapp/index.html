<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Telegram Music Cloud</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin:0;
    background:#0f0f0f;
    font-family:Arial,sans-serif;
    color:#fff;
}
.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 20px;
    background:#1a1a1a;
    border-bottom:1px solid #333;
}
.header-title { font-size:20px; font-weight:bold; }
.search-box input {
    padding:8px 12px;
    border-radius:6px;
    border:none;
    background:#222;
    color:#fff;
}
.layout { padding:15px; }
.library-menu {
    display:flex;
    gap:10px;
    margin-bottom:15px;
}
.menu-btn {
    background:#1e1e1e;
    border:1px solid #333;
    color:#aaa;
    padding:8px 16px;
    border-radius:20px;
}
.menu-btn.active {
    background:#fff;
    color:#000;
}
.songs-container {
    background:#121212;
    border-radius:12px;
    padding:15px;
}
.track-item {
    display:grid;
    grid-template-columns:30px 1fr auto;
    gap:10px;
    padding:10px;
    border-radius:8px;
}
.track-item:hover { background:#1b1b1b; }
.track-title { font-size:14px; font-weight:600; }
.track-artist { font-size:12px; color:#aaa; }
.play-btn {
    width:36px;
    height:36px;
    border-radius:50%;
    border:1px solid #555;
    background:none;
    color:white;
}
.mini-player {
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#1b1b1b;
    border-top:1px solid #333;
    padding:10px 15px;
}
.mini-player.hidden { display:none; }
.mini-title {
    font-size:14px;
    font-weight:600;
    margin-bottom:6px;
}
.controls {
    display:flex;
    justify-content:center;
    gap:25px;
    font-size:26px;
}
.ctrl-btn {
    background:none;
    border:none;
    color:white;
}
.progress {
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12px;
    color:#aaa;
}
.progress input[type=range] {
    flex:1;
    accent-color:white;
}
#audio-player { display:none; }
</style>
</head>

<body>

<div class="header">
    <div class="header-title">Telegram Music Cloud</div>
    <div class="search-box">
        <input type="text" placeholder="Поиск...">
    </div>
</div>

<div class="layout">
    <div class="songs-container">
        <div class="library-menu">
            <button class="menu-btn active">🎵 Библиотека</button>
            <button class="menu-btn">📂 Плейлисты</button>
        </div>
        <div id="track-list"></div>
    </div>
</div>

<div class="mini-player hidden" id="mini-player">
    <div class="mini-title" id="mini-title"></div>
    <div class="controls">
        <button class="ctrl-btn" id="prev">⏮</button>
        <button class="ctrl-btn" id="play">▶</button>
        <button class="ctrl-btn" id="next">⏭</button>
    </div>
    <div class="progress">
        <span id="current">0:00</span>
        <input type="range" id="progress" value="0" min="0" step="0.1">
        <span id="duration">0:00</span>
    </div>
</div>

<audio id="audio-player" preload="metadata"></audio>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const apiBase = "https://telegram-music-player-uh5o.onrender.com";
const audio = document.getElementById("audio-player");

const trackListDiv = document.getElementById("track-list");
const miniTitle = document.getElementById("mini-title");
const playBtn = document.getElementById("play");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");
const progress = document.getElementById("progress");
const currentEl = document.getElementById("current");
const durationEl = document.getElementById("duration");
const miniPlayer = document.getElementById("mini-player");

let tracks = [];
let currentIndex = -1;
let seeking = false;

// 🔥 КЭШ Telegram CDN ссылок
const linkCache = new Map();

async function getStreamUrl(trackId){
    if(linkCache.has(trackId)) {
        return linkCache.get(trackId);
    }

    const r = await fetch(`${apiBase}/api/tracks/play/${trackId}`, {
        headers:{ "X-TG-INIT-DATA": tg.initData }
    });

    const data = await r.json();
    linkCache.set(trackId, data.streamUrl);
    return data.streamUrl;
}

async function loadTracks() {
    const r = await fetch(`${apiBase}/api/tracks`, {
        headers:{ "X-TG-INIT-DATA": tg.initData }
    });
    tracks = await r.json();
    trackListDiv.innerHTML = "";

    tracks.forEach((t,i)=>{
        const div = document.createElement("div");
        div.className = "track-item";
        div.innerHTML = `
            <span>${i+1}</span>
            <div>
                <div class="track-title">${t.originalName}</div>
                <div class="track-artist">${t.performer || "Unknown"}</div>
            </div>
            <button class="play-btn">▶</button>
        `;
        div.querySelector("button").onclick = () => playTrack(i);
        trackListDiv.appendChild(div);
    });
}

async function playTrack(index){
    currentIndex = index;

    audio.pause();
    audio.src = "";

    const streamUrl = await getStreamUrl(tracks[index].id);

    audio.src = streamUrl;
    await audio.play();

    miniTitle.innerText = tracks[index].originalName;
    playBtn.innerText = "⏸";
    miniPlayer.classList.remove("hidden");
}

playBtn.onclick = () => {
    if(audio.paused){
        audio.play();
        playBtn.innerText="⏸";
    } else {
        audio.pause();
        playBtn.innerText="▶";
    }
};

nextBtn.onclick = ()=> currentIndex < tracks.length-1 && playTrack(currentIndex+1);
prevBtn.onclick = ()=> currentIndex > 0 && playTrack(currentIndex-1);
audio.onended = ()=> nextBtn.click();

audio.onloadedmetadata = () => {
    progress.max = audio.duration;
    durationEl.innerText = format(audio.duration);
};

audio.ontimeupdate = () => {
    if(!seeking){
        progress.value = audio.currentTime;
        currentEl.innerText = format(audio.currentTime);
    }
};

progress.oninput = () => {
    seeking = true;
    audio.currentTime = progress.value;
    currentEl.innerText = format(progress.value);
};

progress.onchange = () => {
    seeking = false;
    audio.play();
};

function format(t){
    const m = Math.floor(t/60);
    const s = Math.floor(t%60).toString().padStart(2,"0");
    return `${m}:${s}`;
}

loadTracks();
</script>

</body>
</html>
